<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Borécha × AK Advertising Pitch Deck</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f2f2f2; }
        header { background: #4CAF50; color: white; padding: 10px 0; text-align: center; }
        .container { width: 90%; margin: auto; overflow: hidden; }
        .carousel { display: flex; overflow-x: auto; }
        .slide { min-width: 100%; transition: transform 0.5s ease; }
        img { width: 100%; height: auto; }
        footer { text-align: center; padding: 10px 0; background: #333; color: white; }
    </style>
</head>
<body>
    <header>
        <h1>Borécha × AK Advertising</h1>
    </header>
    <div class="container">
        <div class="carousel">
            <div class="slide"><img src="placeholder1.jpg" alt="Slide 1"></div>
            <div class="slide"><img src="placeholder2.jpg" alt="Slide 2"></div>
            <div class="slide"><img src="placeholder3.jpg" alt="Slide 3"></div>
        </div>
    </div>
    <footer>
        <p>© 2026 Borécha × AK Advertising</p>
    </footer>
    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].style.transform = 'translateX(-100%)';
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].style.transform = 'translateX(0)';
        }, 3000);
    </script>
</body>
</html>
